<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GRIMOIRE | Ritual Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300&family=Geist+Mono:wght@100..400&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --copper: #B87333;
            --oxidized: #4A7C59;
            --mercury: #E5E5E5;
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        body {
            background-color: var(--obsidian);
            color: var(--mercury);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Allow selection for reading text, but keep mono labels clean */
        .mono { 
            font-family: 'Geist Mono', monospace; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            font-size: 0.65rem; 
            user-select: none;
        }

        /* Grain Overlay */
        #grain-canvas {
            position: fixed;
            inset: 0;
            background-image: var(--grain);
            opacity: 0.04;
            pointer-events: none;
            z-index: 1000;
        }

        #three-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* Layout */
        .ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            box-sizing: border-box;
            transition: opacity 0.8s ease, transform 0.8s ease;
            overflow-y: auto;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: translateY(10px);
        }

        /* Ritual Surface */
        .card-slot {
            width: 180px;
            height: 280px;
            border: 1px solid rgba(184, 115, 51, 0.2);
            position: relative;
            transition: all 0.5s ease;
        }

        .card-physical {
            width: 100%;
            height: 100%;
            perspective: 1000px;
            position: absolute;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            background: #0a0a0a;
            border: 1px solid var(--copper);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .card-back {
            background: linear-gradient(135deg, #111, #050505);
            border-color: rgba(184, 115, 51, 0.3);
        }

        .card-front { transform: rotateY(180deg); border: 2px solid var(--copper); box-shadow: 0 0 30px rgba(184, 115, 51, 0.1); }

        .is-flipped .card-inner { transform: rotateY(180deg); }

        /* Sigil Animation */
        .sigil-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 3s linear forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        /* Button */
        .btn-portal {
            border: 1px solid var(--copper);
            padding: 1rem 4rem;
            background: transparent;
            color: var(--copper);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .btn-portal:hover {
            background: var(--copper);
            color: var(--obsidian);
            box-shadow: 0 0 40px rgba(184, 115, 51, 0.4);
        }

        /* Nav */
        .global-nav {
            position: fixed;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--copper); opacity: 0.2; }
    </style>
</head>
<body>

    <div id="grain-canvas"></div>
    <canvas id="three-canvas"></canvas>

    <!-- Global Nav -->
    <nav class="global-nav">
        <div class="flex items-center gap-4 cursor-pointer" onclick="navTo('threshold')">
            <div id="moon-icon" class="w-6 h-6 border border-copper rounded-full flex items-center justify-center">
                <div class="w-1 h-1 bg-copper rounded-full"></div>
            </div>
            <span class="mono opacity-50">Luminescence: <span id="moon-phase">Waxing</span></span>
        </div>
        <div class="flex gap-8">
            <button onclick="navTo('echoes')" class="mono hover:text-copper transition">Echoes</button>
            <button onclick="navTo('library')" class="mono hover:text-copper transition">Archetypes</button>
        </div>
    </nav>

    <!-- UI: THRESHOLD (Home) -->
    <section id="view-threshold" class="ui-layer">
        <div class="flex-1 flex flex-col items-center justify-center">
            <h1 class="text-7xl md:text-[12rem] italic font-light leading-none mb-8 text-center">
                The <span class="text-copper block md:inline">Grimoire</span>
            </h1>
            <p class="max-w-md text-center text-xl opacity-40 font-light mb-12 tracking-wide italic">
                A digital bridge between ancient archetypes and the silicon void.
            </p>
            <button onclick="startJourney()" class="btn-portal mono">Initiate Ritual</button>
        </div>
        <div class="flex justify-between items-end mt-8">
            <span class="mono opacity-20">Ver. 1.0.2 // Finalized Protocol</span>
            <span class="mono opacity-20">Archetypes are eternal</span>
        </div>
    </section>

    <!-- UI: INCANTATION (Intent) -->
    <section id="view-incantation" class="ui-layer hidden">
        <div class="flex-1 flex flex-col items-center justify-center">
            <label for="intent-input" class="mono text-copper mb-8 pulse">— Whisper your intent —</label>
            <input type="text" id="intent-input" maxlength="40" autocomplete="off"
                class="bg-transparent border-b border-copper/30 w-full max-w-4xl py-8 text-4xl md:text-7xl font-light text-center focus:outline-none placeholder:opacity-10 italic" 
                placeholder="What does the void hide?">
            <div class="mt-12 flex flex-col md:flex-row gap-4">
                <button onclick="chooseSpread(1)" class="px-12 py-3 border border-white/10 mono hover:border-copper transition">One (The Spark)</button>
                <button onclick="chooseSpread(3)" class="px-12 py-3 border border-white/10 mono hover:border-copper transition">Three (The Path)</button>
            </div>
        </div>
    </section>

    <!-- UI: RITUAL (Drawing) -->
    <section id="view-ritual" class="ui-layer hidden">
        <div class="flex flex-col h-full">
            <div class="mb-12">
                <h2 id="ritual-title" class="text-4xl italic text-copper">The Spark</h2>
                <p id="ritual-intent-echo" class="mono opacity-30 mt-2 italic"></p>
            </div>
            
            <div id="ritual-slots" class="flex-1 flex flex-wrap items-center justify-center gap-8 md:gap-12">
                <!-- Slots generated by JS -->
            </div>

            <div id="deck-area" class="h-64 flex items-center justify-center relative">
                <div id="main-deck" class="relative w-44 h-64 border-2 border-copper/10 group cursor-pointer hover:border-copper/40 transition-all">
                    <div class="absolute inset-2 border border-copper/5"></div>
                    <div class="absolute inset-0 flex items-center justify-center mono opacity-20 group-hover:opacity-100 transition">Draw</div>
                </div>
            </div>

            <div id="reveal-container" class="hidden flex justify-center py-8">
                <button onclick="manifestVision()" class="btn-portal mono">Break the Veil</button>
            </div>
        </div>
    </section>

    <!-- UI: VISION (Results) -->
    <section id="view-vision" class="ui-layer hidden">
        <div class="max-w-6xl mx-auto py-20 w-full">
            <div class="flex flex-col md:flex-row gap-12 md:gap-20 items-center mb-32">
                <div id="generated-sigil" class="w-48 h-48 md:w-64 md:h-64 border border-copper/20 p-4 shrink-0">
                    <!-- SVG Sigil Generated Here -->
                </div>
                <div>
                    <h2 class="text-5xl md:text-7xl italic mb-4">The Manifested</h2>
                    <p id="vision-intent" class="text-2xl md:text-3xl font-light opacity-60 italic mb-8"></p>
                    <div class="h-1 w-20 bg-copper"></div>
                </div>
            </div>
            
            <div id="vision-grid" class="space-y-40 pb-40">
                <!-- Detailed card meanings -->
            </div>

            <div class="flex justify-center pb-20">
                <button onclick="saveAndReset()" class="btn-portal mono">Dissolve to Echoes</button>
            </div>
        </div>
    </section>

    <!-- UI: ECHOES (History) -->
    <section id="view-echoes" class="ui-layer hidden">
        <div class="max-w-4xl mx-auto py-20 w-full">
            <h2 class="text-5xl italic mb-12 text-copper">Past Echoes</h2>
            <div id="echoes-list" class="space-y-12">
                <!-- History Items -->
            </div>
            <div class="mt-20 flex justify-center">
                <button onclick="navTo('threshold')" class="mono opacity-40 hover:opacity-100 transition">— Return to Threshold —</button>
            </div>
        </div>
    </section>

    <!-- UI: LIBRARY (Archetypes) -->
    <section id="view-library" class="ui-layer hidden">
        <div class="max-w-6xl mx-auto py-20 w-full">
            <h2 class="text-5xl italic mb-12 text-copper">The Major Arcana</h2>
            <div id="library-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Archetype List -->
            </div>
            <div class="mt-20 flex justify-center pb-20">
                <button onclick="navTo('threshold')" class="mono opacity-40 hover:opacity-100 transition">— Return to Threshold —</button>
            </div>
        </div>
    </section>

    <script>
        // --- ARCANA DATA ---
        const ARCHETYPES = [
            { name: "The Fool", keys: "Zero / Risk", desc: "A leap into the digital void. New beginnings without fear of the architecture." },
            { name: "The Magician", keys: "Will / Power", desc: "The user as creator. Raw data transformed into manifestation by pure focus." },
            { name: "High Priestess", keys: "Insight / Mystery", desc: "The hidden layers of the code. Knowledge that lives between the zeroes and ones." },
            { name: "The Empress", keys: "Nature / Birth", desc: "Generative abundance. The creative spark that populates the silence." },
            { name: "The Emperor", keys: "Structure / Order", desc: "The rigid protocols that define reality. Logic as a shield against chaos." },
            { name: "The Hierophant", keys: "Belief / Tradition", desc: "The legacy of the ancestors. Following the ancient algorithms to safe harbor." },
            { name: "The Lovers", keys: "Choice / Unity", desc: "The intersection of two streams. Harmony found in the alignment of data." },
            { name: "The Chariot", keys: "Focus / Victory", desc: "Momentum. Controlling the unruly currents of the digital slipstream." },
            { name: "Strength", keys: "Courage / Softness", desc: "Mastery of the beast. Persuading the system through patience rather than force." },
            { name: "The Hermit", keys: "Solitude / Truth", desc: "The offline journey. Finding truth in the places the network cannot reach." },
            { name: "Wheel of Fortune", keys: "Cycles / Karma", desc: "The loop function. Recognizing that all data eventually returns to its origin." },
            { name: "Justice", keys: "Truth / Balance", desc: "The checksum. Ensuring the internal logic of the world remains consistent." },
            { name: "Hanged Man", keys: "Pause / Surrender", desc: "A suspended state. Finding a new perspective by refusing to execute." },
            { name: "Death", keys: "End / Transition", desc: "The delete key. A necessary clearing to make space for a new installation." },
            { name: "Temperance", keys: "Flow / Mix", desc: "Alchemy. Blending disparate elements into a singular, stable compound." },
            { name: "The Devil", keys: "Bondage / Shadow", desc: "The addictive loop. Being trapped in a system of your own making." },
            { name: "The Tower", keys: "Upheaval / Chaos", desc: "The system crash. A sudden, violent reorganization of existing data." },
            { name: "The Star", keys: "Hope / Renewal", desc: "The beacon. A signal guiding the traveler through the darkest nodes." },
            { name: "The Moon", keys: "Fear / Illusion", desc: "The glitch. Mistaking a visual artifact for a profound truth." },
            { name: "The Sun", keys: "Joy / Vitality", desc: "The clear signal. Perfect transparency and the warmth of understanding." },
            { name: "Judgement", keys: "Call / Rebirth", desc: "The final audit. Answering a summons from the deepest levels of the OS." },
            { name: "The World", keys: "Completion / End", desc: "The final frame. Integration of the self into the universal lattice." }
        ];

        // --- STATE ---
        let state = {
            view: 'threshold',
            intent: '',
            spreadSize: 1,
            drawn: [],
            deck: [],
            busy: false,
            scene: null
        };

        // --- 3D VOID ENGINE ---
        function initVoid() {
            const canvas = document.getElementById('three-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const count = 1500;
            const positions = new Float32Array(count * 3);
            for(let i = 0; i < count; i++) {
                positions[i*3] = (Math.random() - 0.5) * 40;
                positions[i*3+1] = (Math.random() - 0.5) * 40;
                positions[i*3+2] = (Math.random() - 0.5) * 40;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0xB87333,
                size: 0.05,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            camera.position.z = 12;

            function animate() {
                requestAnimationFrame(animate);
                points.rotation.y += 0.0003;
                points.rotation.x += 0.0001;
                material.opacity = 0.2 + Math.sin(Date.now() * 0.001) * 0.1;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- NAVIGATION ---
        function navTo(viewId) {
            document.querySelectorAll('.ui-layer').forEach(l => l.classList.add('hidden'));
            const target = document.getElementById(`view-${viewId}`);
            if(target) target.classList.remove('hidden');
            state.view = viewId;

            if(viewId === 'echoes') renderEchoes();
            if(viewId === 'library') renderLibrary();
        }

        function startJourney() { navTo('incantation'); }

        // --- ECHOES & LIBRARY RENDERING ---
        function renderEchoes() {
            const list = document.getElementById('echoes-list');
            const data = JSON.parse(localStorage.getItem('grimoire_echoes') || '[]');
            
            if(data.length === 0) {
                list.innerHTML = `<p class="mono opacity-20 italic">No echoes recorded in this timeline.</p>`;
                return;
            }

            list.innerHTML = data.map(item => `
                <div class="border-l border-copper/20 pl-6 py-2">
                    <span class="mono text-copper/40 text-[10px]">${item.date}</span>
                    <h4 class="text-2xl italic mb-2">"${item.intent}"</h4>
                    <p class="mono opacity-60 text-xs">${item.cards.join(' • ')}</p>
                </div>
            `).join('');
        }

        function renderLibrary() {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = ARCHETYPES.map(arc => `
                <div class="p-6 border border-white/5 hover:border-copper/20 transition-all group">
                    <h3 class="text-xl italic mb-1 group-hover:text-copper transition">${arc.name}</h3>
                    <p class="mono text-[9px] opacity-40 mb-3">${arc.keys}</p>
                    <p class="text-sm opacity-60 leading-relaxed font-light">${arc.desc}</p>
                </div>
            `).join('');
        }

        // --- RITUAL LOGIC ---
        function chooseSpread(size) {
            const input = document.getElementById('intent-input');
            state.intent = input.value.trim() || "AN UNNAMED HUNGER";
            state.spreadSize = size;
            state.deck = [...ARCHETYPES].sort(() => Math.random() - 0.5);
            state.drawn = [];
            
            document.getElementById('ritual-intent-echo').innerText = `"${state.intent}"`;
            document.getElementById('ritual-title').innerText = size === 1 ? "The Spark" : "The Path";
            
            setupRitualSlots(size);
            navTo('ritual');
        }

        function setupRitualSlots(size) {
            const container = document.getElementById('ritual-slots');
            container.innerHTML = '';
            for(let i = 0; i < size; i++) {
                const slot = document.createElement('div');
                slot.className = "card-slot flex items-center justify-center mono opacity-20 text-[10px]";
                slot.id = `slot-${i}`;
                slot.innerHTML = `Vessel ${i+1}`;
                container.appendChild(slot);
            }
            document.getElementById('main-deck').onclick = drawCard;
        }

        function drawCard() {
            if (state.busy || state.drawn.length >= state.spreadSize) return;
            state.busy = true;

            const cardData = state.deck.pop();
            const isReversed = Math.random() > 0.8;
            const drawIndex = state.drawn.length;
            
            state.drawn.push({ ...cardData, isReversed });

            const slot = document.getElementById(`slot-${drawIndex}`);
            slot.innerHTML = `
                <div class="card-physical" id="card-${drawIndex}">
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front ${isReversed ? 'rotate-180' : ''}">
                            <div class="mono text-copper text-[8px] mb-2">${drawIndex + 1}</div>
                            <div class="flex-1 flex items-center justify-center text-center italic text-xl">
                                ${cardData.name}
                            </div>
                            <div class="mono opacity-30 text-[8px] text-right">${isReversed ? 'Reversed' : 'Upright'}</div>
                        </div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const el = document.getElementById(`card-${drawIndex}`);
                if(el) el.classList.add('is-flipped');
                slot.classList.remove('opacity-20');
                slot.style.borderColor = 'var(--copper)';
                state.busy = false;
            }, 150);

            if (state.drawn.length === state.spreadSize) {
                document.getElementById('deck-area').classList.add('hidden');
                document.getElementById('reveal-container').classList.remove('hidden');
            }
        }

        function generateSigil(text) {
            const seed = text.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const container = document.getElementById('generated-sigil');
            
            let paths = '';
            const pointsCount = 6;
            for(let i = 0; i < pointsCount; i++) {
                const angle = (i / pointsCount) * Math.PI * 2;
                const r = 15 + (seed % 30);
                const x = 50 + Math.cos(angle) * r;
                const y = 50 + Math.sin(angle) * r;
                
                const nextAngle = ((i + 2) % pointsCount / pointsCount) * Math.PI * 2;
                const nx = 50 + Math.cos(nextAngle) * r;
                const ny = 50 + Math.sin(nextAngle) * r;
                
                paths += `<line x1="${x}" y1="${y}" x2="${nx}" y2="${ny}" stroke="#B87333" stroke-width="0.5" class="sigil-path" />`;
            }

            container.innerHTML = `
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#B87333" stroke-width="0.1" opacity="0.2" />
                    <circle cx="50" cy="50" r="1" fill="#B87333" />
                    ${paths}
                </svg>
            `;
        }

        function manifestVision() {
            navTo('vision');
            document.getElementById('vision-intent').innerText = state.intent;
            generateSigil(state.intent);
            
            const grid = document.getElementById('vision-grid');
            grid.innerHTML = state.drawn.map((card, i) => `
                <div class="flex flex-col md:flex-row gap-12 md:gap-20 items-start md:items-center">
                    <div class="w-44 h-64 border-2 border-copper p-1 shrink-0 ${card.isReversed ? 'rotate-180' : ''} shadow-lg shadow-copper/5">
                        <div class="w-full h-full bg-copper/5 flex items-center justify-center text-center p-4 italic text-2xl">
                            ${card.name}
                        </div>
                    </div>
                    <div class="flex-1">
                        <span class="mono text-copper mb-4 block">— Aspect No. ${i+1} —</span>
                        <h3 class="text-4xl md:text-5xl italic mb-6">${card.name} ${card.isReversed ? '<span class="text-xl align-middle opacity-40 ml-4 font-mono uppercase not-italic">(Rev)</span>' : ''}</h3>
                        <p class="mono opacity-40 mb-8 tracking-[0.4em]">${card.keys}</p>
                        <p class="text-xl md:text-2xl font-light leading-relaxed max-w-2xl opacity-80">
                            ${card.desc} ${card.isReversed ? "This archetype is manifesting in shadows, requiring you to look at internal blockage rather than external result." : "The archetype is clear, urging direct alignment with your stated intent."}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function saveAndReset() {
            const echoes = JSON.parse(localStorage.getItem('grimoire_echoes') || '[]');
            echoes.unshift({
                intent: state.intent,
                cards: state.drawn.map(c => c.name),
                date: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem('grimoire_echoes', JSON.stringify(echoes.slice(0, 15)));
            
            // CRITICAL RESET
            state.drawn = [];
            state.deck = [];
            state.intent = '';
            state.busy = false;
            
            document.getElementById('intent-input').value = '';
            document.getElementById('deck-area').classList.remove('hidden');
            document.getElementById('reveal-container').classList.add('hidden');
            navTo('threshold');
        }

        window.onload = () => {
            initVoid();
            const phases = ["New Moon", "Waxing Crescent", "Full Moon", "Waning Gibbous"];
            document.getElementById('moon-phase').innerText = phases[new Date().getDate() % 4];
        };
    </script>
</body>
</html>
